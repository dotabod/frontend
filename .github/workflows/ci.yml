name: CI

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # vp check internally re-runs `pnpm install` to verify deps status;
      # without this, fresh Dependabot bumps trip pnpm's minimumReleaseAge
      # supply-chain policy on the second invocation.
      PNPM_CONFIG_MINIMUM_RELEASE_AGE: 0
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run vp check
        run: pnpm exec vp check
      - name: Run tests
        run: pnpm test
