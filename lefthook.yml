pre-commit:
  piped: true
  commands:
    fmt:
      run: |
        npx vp fmt {staged_files} \
          && git add {staged_files}
    lint-fix:
      glob: '*.{js,jsx,ts,tsx,mjs,cjs}'
      run: |
        npx vp lint --fix {staged_files} \
          && git add {staged_files}
    check:
      run: npx vp check
    test:
      run: npx vp test run
